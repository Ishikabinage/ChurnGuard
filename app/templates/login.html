{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h4 class="fw-bold mb-1">Welcome Back</h4>
      <p class="text-muted small mb-4">Login to your ChurnGuard account</p>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Your username" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Your password" required>
        </div>
        <button class="btn w-100 py-2 text-white" style="background:#4f46e5;" type="submit">Login</button>
      </form>
      <p class="text-center text-muted small mt-3">No account? <a href="/register">Register here</a></p>
    </div>
  </div>
</div>
{% endblock %}
