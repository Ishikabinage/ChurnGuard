{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h4 class="fw-bold mb-1">Create Account</h4>
      <p class="text-muted small mb-4">Join ChurnGuard to start predicting</p>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-500">Username</label>
          <input type="text" name="username" class="form-control" placeholder="e.g. ishika" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
        </div>
        <button class="btn w-100 py-2 text-white" style="background:#4f46e5;" type="submit">Create Account</button>
      </form>
      <p class="text-center text-muted small mt-3">Already have an account? <a href="/login">Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
